<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – Campus Events</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Navigation -->
<nav class="dash-nav">
    <div class="brand">
        <i class="fas fa-calendar-alt"></i> Campus Events
        <span style="font-size:0.65rem;background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:10px;margin-left:4px">ADMIN</span>
    </div>
    <div class="nav-right">
        <button class="notif-btn" id="notifToggle" title="Notifications">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="notifCount" style="display:none">0</span>
        </button>
        <span class="user-info" id="userDisplay"></span>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</nav>

<!-- Tab Bar -->
<div class="tab-bar">
    <button class="tab-btn active" data-tab="pending">Pending Approval</button>
    <button class="tab-btn" data-tab="all-events">All Events</button>
    <button class="tab-btn" data-tab="users">Users</button>
    <button class="tab-btn" data-tab="notifications">Notifications</button>
</div>

<!-- Content -->
<div class="dash-content">

    <!-- Pending Approval -->
    <div class="tab-panel active" id="tab-pending">
        <h2 class="page-title">Pending Approval</h2>
        <p class="section-sub">Review events submitted by organizers and approve or reject them.</p>
        <div id="pendingContainer"></div>
    </div>

    <!-- All Events -->
    <div class="tab-panel" id="tab-all-events">
        <h2 class="page-title">All Events</h2>
        <div id="allEventsContainer"></div>
    </div>

    <!-- Users -->
    <div class="tab-panel" id="tab-users">
        <h2 class="page-title">Manage Users</h2>
        <div class="card" style="overflow-x:auto">
            <table class="table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Notifications -->
    <div class="tab-panel" id="tab-notifications">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
            <h2 class="page-title" style="margin:0">Notifications</h2>
            <button class="btn btn-outline btn-sm" id="markAllReadBtn">Mark All Read</button>
        </div>
        <div class="card" id="notifContainer">
            <div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet.</p></div>
        </div>
    </div>
</div>

<script src="../Shared/JavaScript/data.js"></script>
<script>
    // ── Auth Guard ───────────────────────────────────────────────────────────
    const user = CampusData.getCurrentUser();
    if (!user || user.role !== 'admin') {
        window.location.href = '../Login/Login_page/HTML/Login.html';
    }

    document.getElementById('userDisplay').textContent = 'Hi, ' + user.username;

    document.getElementById('logoutBtn').addEventListener('click', () => {
        CampusData.logout();
        window.location.href = '../Login/Login_page/HTML/Login.html';
    });

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.getElementById('notifToggle').addEventListener('click', () => switchTab('notifications'));

    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const btn = document.querySelector(`[data-tab="${name}"]`);
        if (btn) btn.classList.add('active');
        const panel = document.getElementById('tab-' + name);
        if (panel) panel.classList.add('active');
        if (name === 'pending')      renderPending();
        if (name === 'all-events')   renderAllEvents();
        if (name === 'users')        renderUsers();
        if (name === 'notifications') renderNotifications();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    const formatDate = d => CampusData.formatDate(d);
    const formatTime = t => CampusData.formatTime(t);

    function updateNotifBadge() {
        const count = CampusData.getUnreadCount(user.id);
        const badge = document.getElementById('notifCount');
        badge.textContent = count > 99 ? '99+' : count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }

    // ── Pending Approval ──────────────────────────────────────────────────────
    function renderPending() {
        const events = CampusData.getPendingEvents();
        const container = document.getElementById('pendingContainer');
        if (events.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No events pending approval.</p></div>';
            return;
        }
        container.innerHTML = events.map(ev => `
        <div class="card">
            <div class="card-header">
                <span class="card-title">${ev.title}</span>
                <span class="badge badge-warning">Pending</span>
            </div>
            <div class="card-meta">
                <span><i class="far fa-calendar"></i> ${formatDate(ev.date)}</span>
                <span><i class="far fa-clock"></i> ${formatTime(ev.time)}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                <span><i class="fas fa-user"></i> By: ${ev.organizerName}</span>
                <span><i class="fas fa-tag"></i> ${ev.category}</span>
            </div>
            <p class="card-desc">${ev.description}</p>
            <div class="tags">${(ev.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            <div class="card-footer">
                <button class="btn btn-success btn-sm" onclick="approveEvent('${ev.id}')">
                    <i class="fas fa-check"></i> Approve
                </button>
                <button class="btn btn-danger btn-sm" onclick="rejectEvent('${ev.id}')">
                    <i class="fas fa-times"></i> Reject
                </button>
            </div>
        </div>`).join('');
    }

    function approveEvent(id) {
        CampusData.approveEvent(id);
        renderPending();
        updateNotifBadge();
    }

    function rejectEvent(id) {
        CampusData.rejectEvent(id);
        renderPending();
        updateNotifBadge();
    }

    // ── All Events ────────────────────────────────────────────────────────────
    function renderAllEvents() {
        const events = CampusData.getEvents();
        const container = document.getElementById('allEventsContainer');
        if (events.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar"></i><p>No events in the system.</p></div>';
            return;
        }
        container.innerHTML = events.map(ev => {
            const badgeClass  = ev.status === 'approved' ? 'badge-success' : ev.status === 'rejected' ? 'badge-danger' : 'badge-warning';
            const rsvpCount   = CampusData.getRSVPsByEvent(ev.id).length;
            return `
            <div class="card">
                <div class="card-header">
                    <span class="card-title">${ev.title}</span>
                    <span class="badge ${badgeClass}">${ev.status}</span>
                </div>
                <div class="card-meta">
                    <span><i class="far fa-calendar"></i> ${formatDate(ev.date)}</span>
                    <span><i class="fas fa-user"></i> ${ev.organizerName}</span>
                    <span><i class="fas fa-users"></i> ${rsvpCount} RSVP${rsvpCount !== 1 ? 's' : ''}</span>
                    <span><i class="fas fa-tag"></i> ${ev.category}</span>
                </div>
                <div class="card-footer">
                    ${ev.status !== 'approved'
                        ? `<button class="btn btn-success btn-sm" onclick="approveAll('${ev.id}')"><i class="fas fa-check"></i> Approve</button>` : ''}
                    ${ev.status !== 'rejected'
                        ? `<button class="btn btn-warning btn-sm" onclick="rejectAll('${ev.id}')"><i class="fas fa-times"></i> Reject</button>` : ''}
                    <button class="btn btn-danger btn-sm" onclick="deleteEvent('${ev.id}')">
                        <i class="fas fa-trash"></i> Delete
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function approveAll(id) { CampusData.approveEvent(id); renderAllEvents(); updateNotifBadge(); }
    function rejectAll(id)  { CampusData.rejectEvent(id);  renderAllEvents(); updateNotifBadge(); }
    function deleteEvent(id) {
        if (!confirm('Permanently delete this event?')) return;
        CampusData.deleteEvent(id);
        renderAllEvents();
    }

    // ── Users ─────────────────────────────────────────────────────────────────
    function renderUsers() {
        const users = CampusData.getUsers();
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = users.map(u => `
        <tr>
            <td><strong>${u.username}</strong></td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-info' : u.role === 'organizer' ? 'badge-warning' : 'badge-success'}">${u.role}</span></td>
            <td>${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—'}</td>
            <td>
                ${u.id !== user.id
                    ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')"><i class="fas fa-trash"></i> Delete</button>`
                    : '<span style="color:#6B7280;font-size:0.85rem">Current User</span>'}
            </td>
        </tr>`).join('');
    }

    function deleteUser(id) {
        if (!confirm('Delete this user?')) return;
        CampusData.deleteUser(id);
        renderUsers();
    }

    // ── Notifications ─────────────────────────────────────────────────────────
    function renderNotifications() {
        const notifs = CampusData.getNotificationsForUser(user.id);
        const container = document.getElementById('notifContainer');
        if (notifs.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet.</p></div>';
            updateNotifBadge();
            return;
        }
        container.innerHTML = notifs.map(n => `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
            ${!n.read ? '<div class="notif-dot"></div>' : '<div class="notif-dot-placeholder"></div>'}
            <div>
                <div class="notif-text">${n.message}</div>
                <div class="notif-time">${new Date(n.timestamp).toLocaleString()}</div>
            </div>
        </div>`).join('');
        updateNotifBadge();
    }

    function markRead(notifId) {
        CampusData.markNotificationRead(notifId);
        renderNotifications();
    }

    document.getElementById('markAllReadBtn').addEventListener('click', () => {
        CampusData.markAllRead(user.id);
        renderNotifications();
    });

    // ── Initial render ────────────────────────────────────────────────────────
    renderPending();
    updateNotifBadge();
</script>
</body>
</html>
