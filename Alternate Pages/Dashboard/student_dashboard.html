<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard – Campus Events</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- Navigation -->
<nav class="dash-nav">
    <div class="brand"><i class="fas fa-calendar-alt"></i> Campus Events</div>
    <div class="nav-right">
        <button class="notif-btn" id="notifToggle" title="Notifications">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="notifCount" style="display:none">0</span>
        </button>
        <span class="user-info" id="userDisplay"></span>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
</nav>

<!-- Tab Bar -->
<div class="tab-bar">
    <button class="tab-btn active" data-tab="browse">Browse Events</button>
    <button class="tab-btn" data-tab="my-rsvps">My RSVPs</button>
    <button class="tab-btn" data-tab="notifications">Notifications</button>
</div>

<!-- Content -->
<div class="dash-content">

    <!-- Browse Events -->
    <div class="tab-panel active" id="tab-browse">
        <h2 class="page-title">Upcoming Events</h2>
        <div class="search-bar">
            <input class="search-input" type="text" id="searchInput" placeholder="Search events…">
            <select class="filter-select" id="categoryFilter">
                <option value="">All Categories</option>
                <option value="technology">Technology</option>
                <option value="cultural">Cultural</option>
                <option value="career">Career</option>
                <option value="sports">Sports</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div id="eventsContainer"></div>
    </div>

    <!-- My RSVPs -->
    <div class="tab-panel" id="tab-my-rsvps">
        <h2 class="page-title">My RSVPs</h2>
        <div id="rsvpsContainer"></div>
    </div>

    <!-- Notifications -->
    <div class="tab-panel" id="tab-notifications">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
            <h2 class="page-title" style="margin:0">Notifications</h2>
            <button class="btn btn-outline btn-sm" id="markAllReadBtn">Mark All Read</button>
        </div>
        <div class="card" id="notifContainer">
            <div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet.</p></div>
        </div>
    </div>
</div>

<script src="../Shared/JavaScript/data.js"></script>
<script>
    // ── Auth Guard ───────────────────────────────────────────────────────────
    const user = CampusData.getCurrentUser();
    if (!user || user.role !== 'student') {
        window.location.href = '../Login/Login_page/HTML/Login.html';
    }

    document.getElementById('userDisplay').textContent = 'Hi, ' + user.username;

    document.getElementById('logoutBtn').addEventListener('click', () => {
        CampusData.logout();
        window.location.href = '../Login/Login_page/HTML/Login.html';
    });

    // ── Tabs ─────────────────────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    document.getElementById('notifToggle').addEventListener('click', () => switchTab('notifications'));

    function switchTab(name) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        const btn = document.querySelector(`[data-tab="${name}"]`);
        if (btn) btn.classList.add('active');
        const panel = document.getElementById('tab-' + name);
        if (panel) panel.classList.add('active');
        if (name === 'notifications') renderNotifications();
        if (name === 'my-rsvps') renderMyRSVPs();
    }

    // ── Helpers ───────────────────────────────────────────────────────────────
    const formatDate = d => CampusData.formatDate(d);
    const formatTime = t => CampusData.formatTime(t);

    // ── Notification Badge ────────────────────────────────────────────────────
    function updateNotifBadge() {
        const count = CampusData.getUnreadCount(user.id);
        const badge = document.getElementById('notifCount');
        badge.textContent = count > 99 ? '99+' : count;
        badge.style.display = count > 0 ? 'flex' : 'none';
    }

    // ── Browse Events ─────────────────────────────────────────────────────────
    function renderEvents() {
        const query    = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('categoryFilter').value;
        let events = CampusData.getApprovedEvents();
        if (query)    events = events.filter(e =>
            e.title.toLowerCase().includes(query) ||
            e.description.toLowerCase().includes(query) ||
            e.location.toLowerCase().includes(query)
        );
        if (category) events = events.filter(e => e.category === category);

        const container = document.getElementById('eventsContainer');
        if (events.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><p>No events found.</p></div>';
            return;
        }
        container.innerHTML = events.map(ev => {
            const rsvped = CampusData.isRSVPed(user.id, ev.id);
            return `
            <div class="card">
                <div class="card-header">
                    <span class="card-title">${ev.title}</span>
                    <span class="badge badge-success">Approved</span>
                </div>
                <div class="card-meta">
                    <span><i class="far fa-calendar"></i> ${formatDate(ev.date)}</span>
                    <span><i class="far fa-clock"></i> ${formatTime(ev.time)}</span>
                    <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
                    <span><i class="fas fa-users"></i> ${ev.attendeeCount} attending</span>
                    <span><i class="fas fa-tag"></i> ${ev.category}</span>
                </div>
                <p class="card-desc">${ev.description}</p>
                <div class="tags">${(ev.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <div class="card-footer">
                    <button class="btn ${rsvped ? 'btn-danger' : 'btn-primary'} btn-sm"
                            onclick="toggleRSVP('${ev.id}', ${rsvped})">
                        <i class="fas ${rsvped ? 'fa-times' : 'fa-check'}"></i>
                        ${rsvped ? 'Cancel RSVP' : 'RSVP'}
                    </button>
                </div>
            </div>`;
        }).join('');
    }

    function toggleRSVP(eventId, isRSVPed) {
        if (isRSVPed) {
            CampusData.removeRSVP(user.id, eventId);
        } else {
            CampusData.addRSVP(user.id, eventId);
        }
        renderEvents();
        updateNotifBadge();
    }

    // ── My RSVPs ──────────────────────────────────────────────────────────────
    function renderMyRSVPs() {
        const rsvps  = CampusData.getRSVPsByUser(user.id);
        const container = document.getElementById('rsvpsContainer');
        if (rsvps.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-check"></i><p>You have not RSVP\'d to any events yet.</p></div>';
            return;
        }
        const events = rsvps.map(r => CampusData.getEventById(r.eventId)).filter(Boolean);
        container.innerHTML = events.map(ev => `
        <div class="card">
            <div class="card-header">
                <span class="card-title">${ev.title}</span>
                <span class="badge ${ev.status === 'approved' ? 'badge-success' : 'badge-warning'}">${ev.status}</span>
            </div>
            <div class="card-meta">
                <span><i class="far fa-calendar"></i> ${formatDate(ev.date)}</span>
                <span><i class="far fa-clock"></i> ${formatTime(ev.time)}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>
            </div>
            <div class="card-footer">
                <button class="btn btn-danger btn-sm" onclick="cancelRSVP('${ev.id}')">
                    <i class="fas fa-times"></i> Cancel RSVP
                </button>
            </div>
        </div>`).join('');
    }

    function cancelRSVP(eventId) {
        CampusData.removeRSVP(user.id, eventId);
        renderMyRSVPs();
        updateNotifBadge();
    }

    // ── Notifications ─────────────────────────────────────────────────────────
    function renderNotifications() {
        const notifs = CampusData.getNotificationsForUser(user.id);
        const container = document.getElementById('notifContainer');
        if (notifs.length === 0) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-bell-slash"></i><p>No notifications yet.</p></div>';
            updateNotifBadge();
            return;
        }
        container.innerHTML = notifs.map(n => `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
            ${!n.read ? '<div class="notif-dot"></div>' : '<div class="notif-dot-placeholder"></div>'}
            <div>
                <div class="notif-text">${n.message}</div>
                <div class="notif-time">${new Date(n.timestamp).toLocaleString()}</div>
            </div>
        </div>`).join('');
        updateNotifBadge();
    }

    function markRead(notifId) {
        CampusData.markNotificationRead(notifId);
        renderNotifications();
    }

    document.getElementById('markAllReadBtn').addEventListener('click', () => {
        CampusData.markAllRead(user.id);
        renderNotifications();
    });

    // ── Wire up search/filter ─────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('input', renderEvents);
    document.getElementById('categoryFilter').addEventListener('change', renderEvents);

    // ── Initial render ────────────────────────────────────────────────────────
    renderEvents();
    updateNotifBadge();
</script>
</body>
</html>
