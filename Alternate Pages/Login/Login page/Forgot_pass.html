<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Campus Events</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- CLEAN NAVBAR -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a href="../../../index.html" class="nav-brand">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Campus Events</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- WRAPPER (centers + background) -->
    <div class="login-page">

        <div class="Forgot_box">

            <!-- back button FIRST (better UX) -->
            <div class="Back_Arrow">
                <button id="Back" class="Arrow">←</button>
            </div>

            <h2>Forgot Password?</h2>
            <p class="subtitle">Enter your email to reset your password</p>

            <!-- FIXED input type -->
            <input type="email" class="Forgot_Email" placeholder="Enter Email">

            <!-- FIXED typo -->
            <button id="SEmail" class="SEmail">Submit Email</button>

        </div>

    </div>

    <script src="Forgot.js"></script>
</body>
</html>
